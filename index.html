<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يامي | YAMI HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020205; color: white; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-active { background: linear-gradient(135deg, #a855f7, #3b82f6); color: white !important; }
        #adminSidebar { position: fixed; inset: 0; background: #050508; z-index: 9999; transition: 0.5s; transform: translateY(-100%); padding: 40px 20px; overflow-y: auto; }
        #adminSidebar.open { transform: translateY(0); }
        #descModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        #descModal.active { display: flex; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .search-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 12px 20px; width: 100%; outline: none; transition: 0.3s; font-size: 12px; }
    </style>
</head>
<body>

    <aside id="adminSidebar">
        <div class="max-w-2xl mx-auto text-center">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black text-purple-500 italic">YAMI DASHBOARD</h2>
                <button onclick="toggleAdmin()" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-full font-bold text-xs border border-red-500/20">خروج 🚪</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-right">
                <div class="space-y-4 bg-white/5 p-6 rounded-[30px] border border-white/5">
                    <input type="text" id="itemName" placeholder="اسم العنصر" class="search-box">
                    <input type="file" id="itemFile" accept="image/*" class="text-[10px] block w-full">
                    <textarea id="itemDesc" placeholder="الوصف" class="search-box h-20"></textarea>
                    <input type="text" id="itemLink" placeholder="رابط التحميل" class="search-box">
                    <select id="itemType" class="search-box">
                        <option value="games">🎮 ألعاب</option>
                        <option value="apps">📱 تطبيقات</option>
                        <option value="tools">🛠️ أدوات</option>
                    </select>
                    <button id="saveBtn" class="w-full py-4 bg-purple-600 rounded-2xl font-black">نشر الآن ✨</button>
                </div>

                <div class="bg-white/5 p-6 rounded-[30px] border border-white/5">
                    <input type="text" id="adminSearch" oninput="filterAdminItems()" placeholder="ابحث للحذف..." class="search-box mb-4">
                    <div id="admin-items-list" class="space-y-2 max-h-[300px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </aside>

    <header class="pt-12 pb-4 text-center px-4">
        <img id="myAvatar" src="https://i.ibb.co/hFBnP5S/image.png" class="w-28 h-28 rounded-full border-2 border-white/10 mx-auto mb-4 object-cover">
        <h1 class="text-2xl font-black italic">🇾🇪 يامي | <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">YAMI</span></h1>
        
        <div class="max-w-sm mx-auto mt-6 px-4">
            <input type="text" id="mainSearch" oninput="searchItems()" placeholder="ابحث هنا..." class="search-box text-center">
        </div>

        <nav class="mt-6 glass-nav inline-flex p-1 mx-auto overflow-x-auto max-w-full">
            <button onclick="changeTab('trending')" id="t-trending" class="px-5 py-2 text-[10px] font-bold rounded-full tab-active transition whitespace-nowrap">جديد 🔥</button>
            <button onclick="changeTab('games')" id="t-games" class="px-5 py-2 text-[10px] font-bold rounded-full transition text-gray-400 whitespace-nowrap">الألعاب</button>
            <button onclick="changeTab('apps')" id="t-apps" class="px-5 py-2 text-[10px] font-bold rounded-full transition text-gray-400 whitespace-nowrap">التطبيقات</button>
            <button onclick="changeTab('tools')" id="t-tools" class="px-5 py-2 text-[10px] font-bold rounded-full transition text-gray-400 whitespace-nowrap">الأدوات</button>
            <button onclick="changeTab('social')" id="t-social" class="px-5 py-2 text-[10px] font-bold rounded-full transition text-gray-400 whitespace-nowrap">تواصل</button>
        </nav>
    </header>

    <main class="max-w-md mx-auto px-6 pb-20 mt-4">
        <div id="content-area" class="space-y-3"></div>
        <div id="social-area" class="hidden space-y-3 text-center">
            <a href="https://www.instagram.com/d_a_r_k_j7" class="block p-5 bg-white/5 border border-pink-500/20 rounded-2xl flex items-center gap-4">
                <i class="fab fa-instagram text-2xl text-pink-500"></i><span class="font-bold text-sm">إنستقرام</span>
            </a>
            <a href="https://wa.me/966574360046" class="block p-5 bg-white/5 border border-green-500/20 rounded-2xl flex items-center gap-4">
                <i class="fab fa-whatsapp text-2xl text-green-500"></i><span class="font-bold text-sm">واتساب</span>
            </a>
        </div>
    </main>

    <div id="descModal">
        <div class="bg-[#0a0a0f] border border-white/10 w-[90%] max-w-sm rounded-[30px] p-8 relative">
            <button onclick="closeDesc()" class="absolute top-4 right-4 text-gray-500">✕</button>
            <img id="modalImg" class="w-20 h-20 mx-auto rounded-2xl object-cover mb-4">
            <h2 id="modalName" class="text-xl font-black text-center mb-2"></h2>
            <p id="modalDesc" class="text-gray-400 text-[11px] text-center mb-8"></p>
            <div id="lockSection">
                <button onclick="forceFollow()" class="w-full py-4 bg-white text-black rounded-2xl font-black text-xs">تابعني لفتح التحميل 🔒</button>
            </div>
            <a id="downloadBtn" href="#" target="_blank" class="hidden w-full py-4 bg-purple-600 rounded-2xl font-black text-xs text-center block">تحميل الآن ✅</a>
        </div>
    </div>

    <button onclick="adminLogin()" class="fixed bottom-6 left-6 opacity-0">ADMIN</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9wIxA2gNyKDdht53W2D4EHEY-e9Fh3j8",
            authDomain: "yamiaapp.firebaseapp.com",
            projectId: "yamiaapp",
            storageBucket: "yamiaapp.firebasestorage.app",
            messagingSenderId: "688692284593",
            appId: "1:688692284593:web:0f83b5d5105325b044e690"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentItems = [];
        let allAdminItems = [];

        const toBase64 = f => new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = () => res(r.result);
        });

        document.getElementById('saveBtn').onclick = async () => {
            const n = document.getElementById('itemName').value;
            const d = document.getElementById('itemDesc').value;
            const l = document.getElementById('itemLink').value;
            const t = document.getElementById('itemType').value;
            const f = document.getElementById('itemFile').files[0];

            if(!n || !f) return alert("البيانات ناقصة!");
            const img = await toBase64(f);
            const ts = serverTimestamp();

            await addDoc(collection(db, t), { name: n, desc: d, link: l, img: img, createdAt: ts });
            await addDoc(collection(db, "trending"), { name: n, desc: d, link: l, img: img, createdAt: ts, isAuto: true });
            alert("تم النشر!");
        };

        window.changeTab = (type) => {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-white'));
            document.getElementById('t-' + type).classList.add('tab-active', 'text-white');
            if(type === 'social') {
                document.getElementById('content-area').classList.add('hidden');
                document.getElementById('social-area').classList.remove('hidden');
            } else {
                document.getElementById('content-area').classList.remove('hidden');
                document.getElementById('social-area').classList.add('hidden');
                onSnapshot(query(collection(db, type), orderBy("createdAt", "desc")), snap => {
                    currentItems = [];
                    snap.forEach(doc => currentItems.push({ id: doc.id, ...doc.data() }));
                    displayItems(currentItems);
                });
            }
        };

        function displayItems(items) {
            const area = document.getElementById('content-area');
            area.innerHTML = "";
            items.forEach((item) => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 bg-white/5 rounded-2xl flex items-center justify-between border border-white/5 mb-3";
                btn.onclick = () => {
                    document.getElementById('modalName').innerText = item.name;
                    document.getElementById('modalImg').src = item.img;
                    document.getElementById('modalDesc').innerText = item.desc || "لا يوجد وصف.";
                    document.getElementById('downloadBtn').href = item.link;
                    document.getElementById('lockSection').classList.remove('hidden');
                    document.getElementById('downloadBtn').classList.add('hidden');
                    document.getElementById('descModal').classList.add('active');
                };
                btn.innerHTML = `<div class="flex items-center gap-3"><img src="${item.img}" class="w-10 h-10 rounded-lg object-cover"><span class="text-xs font-bold">${item.name}</span></div><i class="fas fa-arrow-left text-[10px] opacity-20"></i>`;
                area.appendChild(btn);
            });
        }

        window.searchItems = () => {
            const term = document.getElementById('mainSearch').value.toLowerCase();
            displayItems(currentItems.filter(i => i.name.toLowerCase().includes(term)));
        };

        window.toggleAdmin = () => {
            document.getElementById('adminSidebar').classList.toggle('open');
            const types = ['trending', 'games', 'apps', 'tools'];
            allAdminItems = [];
            types.forEach(t => {
                onSnapshot(collection(db, t), snap => {
                    snap.forEach(d => allAdminItems.push({ id: d.id, type: t, ...d.data() }));
                    filterAdminItems();
                });
            });
        };

        window.filterAdminItems = () => {
            const term = document.getElementById('adminSearch').value.toLowerCase();
            const list = document.getElementById('admin-items-list');
            list.innerHTML = "";
            allAdminItems.filter((v,i,a)=>a.findIndex(t=>(t.id===v.id))===i) // إزالة التكرار
            .filter(i => i.name.toLowerCase().includes(term)).forEach(item => {
                list.innerHTML += `<div class="flex items-center justify-between bg-white/5 p-3 rounded-xl mb-2"><span class="text-[10px]">${item.name}</span><button onclick="deleteItem('${item.type}', '${item.id}')" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
            });
        };

        window.deleteItem = async (t, id) => { if(confirm("حذف؟")) await deleteDoc(doc(db, t, id)); };
        window.forceFollow = () => {
            window.open('https://www.instagram.com/d_a_r_k_j7', '_blank');
            setTimeout(() => {
                document.getElementById('lockSection').classList.add('hidden');
                document.getElementById('downloadBtn').classList.remove('hidden');
            }, 2500);
        };
        window.closeDesc = () => document.getElementById('descModal').classList.remove('active');
        window.adminLogin = () => { if(prompt("Pass:") === "🇾🇪*야미, 네 삼촌|  |يامي عمكم*") toggleAdmin(); };

        changeTab('trending');
    </script>
</body>
</html>
