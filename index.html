<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇾🇪 야미, 네 삼촌 | يامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-purple: #a855f7; --main-bg: #050505; }
        body { background-color: var(--main-bg) !important; color: white !important; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #adminSidebar { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: #0f0f1b; border-right: 1px solid var(--neon-purple); transition: 0.5s; z-index: 1000; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #adminSidebar.open { left: 0; }
        .admin-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 10px; border-radius: 10px; margin-bottom: 10px; color: white; outline: none; font-size: 12px; }
        .active-tab { background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%) !important; border: none !important; }
        .tab-content { display: none; }
        .active-content { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="p-4 flex justify-end">
        <button onclick="askAuth()" class="text-[10px] text-gray-600 hover:text-purple-400">الإدارة ⚙️</button>
    </div>

    <div id="adminSidebar">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-purple-400">لوحة التحكم</h3>
            <button onclick="closeSidebar()" class="text-gray-500">✕</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="itemName" placeholder="اسم اللعبة/التطبيق" class="admin-input">
            <input type="text" id="itemImg" placeholder="رابط الصورة (URL)" class="admin-input">
            <input type="text" id="itemLink" placeholder="رابط التحميل" class="admin-input">
            <select id="itemType" class="admin-input">
                <option value="games">لعبة</option>
                <option value="apps">تطبيق</option>
            </select>
            <button id="addBtn" class="w-full bg-purple-600 py-2 rounded-xl text-sm font-bold">حفظ البيانات 🚀</button>
        </div>
    </div>

    <header class="py-10 text-center">
        <img src="https://aljnwbshbl70-source.github.io/yamiapp/F76ebbeddd192a631784bdd8cc6b86f9.png" 
             onerror="this.src='https://via.placeholder.com/150'" 
             class="w-28 h-28 rounded-full mx-auto border-2 border-purple-500 p-1 mb-4 shadow-lg shadow-purple-500/20 object-cover">
        <h1 class="text-2xl font-black text-purple-400">🇾🇪 야미, 네 삼촌 | يامي</h1>
        <p class="text-gray-500 text-xs mt-1 italic">المركز الرقمي الشخصي ⚡</p>
    </header>

    <nav class="max-w-xs mx-auto px-4 grid grid-cols-3 gap-2 mb-10">
        <button onclick="showTab('games')" id="btn-games" class="tab-btn glass py-2 rounded-xl text-[10px] font-bold active-tab">الألعاب</button>
        <button onclick="showTab('apps')" id="btn-apps" class="tab-btn glass py-2 rounded-xl text-[10px] font-bold">التطبيقات</button>
        <button onclick="showTab('contact')" id="btn-contact" class="tab-btn glass py-2 rounded-xl text-[10px] font-bold">تواصل</button>
    </nav>

    <main class="max-w-4xl mx-auto px-6 mb-20">
        <div id="games" class="tab-content active-content">
            <div id="games-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
        <div id="apps" class="tab-content">
            <div id="apps-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
        <div id="contact" class="tab-content text-center">
            <div class="space-y-4 max-w-sm mx-auto">
                <a href="https://wa.me/966574360046" target="_blank" class="glass block p-4 rounded-2xl flex items-center gap-4">
                    <i class="fab fa-whatsapp text-green-500"></i> واتساب
                </a>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6XA3vWHFskKV_6v5Xj7TTBO8W0bvhQ2E",
            authDomain: "yamiapp-e7765.firebaseapp.com",
            projectId: "yamiapp-e7765",
            storageBucket: "yamiapp-e7765.firebasestorage.app",
            messagingSenderId: "546559285368",
            appId: "1:546559285368:web:8a2313d35126a93cb8758d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // الحماية وفتح السايد بار
        const adminPass = "🇾🇪*야미, 네 삼촌|  |يامي عمكم*";
        window.askAuth = () => {
            const input = prompt("كلمة مرور الإدارة:");
            if (input === adminPass) {
                document.getElementById('adminSidebar').classList.add('open');
            } else {
                alert("كلمة مرور خاطئة!");
            }
        };

        window.closeSidebar = () => document.getElementById('adminSidebar').classList.remove('open');

        // إضافة البيانات إلى Firebase مع معالجة الأخطاء
        document.getElementById('addBtn').onclick = async () => {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            const type = document.getElementById('itemType').value;

            if (!name || !img || !link) {
                alert("يرجى تعبئة جميع الخانات!");
                return;
            }

            try {
                await addDoc(collection(db, type), {
                    name, img, link, createdAt: serverTimestamp()
                });
                alert("تم حفظ البيانات ونشرها بنجاح! 🎉");
                document.getElementById('itemName').value = "";
                document.getElementById('itemImg').value = "";
                document.getElementById('itemLink').value = "";
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("فشل الحفظ. تأكد من إعدادات الـ Rules في Firebase Console.");
            }
        };

        // جلب البيانات وعرضها
        function loadData(col, gridId) {
            const q = query(collection(db, col), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById(gridId);
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    grid.innerHTML += `
                        <div class="glass p-3 rounded-2xl text-center">
                            <img src="${data.img}" class="w-full h-24 object-cover rounded-xl mb-2" onerror="this.src='https://via.placeholder.com/100'">
                            <h4 class="text-[10px] font-bold truncate">${data.name}</h4>
                            <a href="${data.link}" target="_blank" class="block bg-white/10 py-1.5 rounded-lg text-[9px] mt-2 hover:bg-white hover:text-black transition">تحميل</a>
                        </div>`;
                });
            });
        }

        loadData('games', 'games-grid');
        loadData('apps', 'apps-grid');

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-content'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-content');
            document.getElementById('btn-' + id).classList.add('active-tab');
        };
    </script>
</body>
</html>
