<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يامي | YAMI HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020205; color: white; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .neon-border { border: 1px solid rgba(168, 85, 247, 0.2); transition: 0.3s; }
        .neon-border:hover { border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .glass-nav { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-active { background: linear-gradient(135deg, #a855f7, #3b82f6); color: white !important; }
        
        /* تصميم النافذة المنبثقة (صفحة الوصف) */
        #descModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #descModal.active { display: flex; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        #adminSidebar { position: fixed; top: 0; left: -100%; width: 320px; height: 100vh; background: #08080c; border-right: 2px solid #a855f7; z-index: 3000; transition: 0.5s cubic-bezier(0.85, 0, 0.15, 1); padding: 25px; }
        #adminSidebar.open { left: 0; }
    </style>
</head>
<body>

    <aside id="adminSidebar">
        <h2 class="text-xl font-black mb-6 text-purple-500 italic">YAMI ADMIN</h2>
        <div class="space-y-4">
            <input type="text" id="itemName" placeholder="اسم العنصر" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm">
            <input type="file" id="itemFile" accept="image/*" class="text-[10px] block w-full">
            <textarea id="itemDesc" placeholder="وصف التطبيق/الأداة" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm h-24"></textarea>
            <input type="text" id="itemLink" placeholder="رابط التحميل" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm">
            <select id="itemType" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm">
                <option value="games">🎮 ألعاب</option>
                <option value="apps">📱 تطبيقات</option>
                <option value="tools">🛠️ أدوات</option>
            </select>
            <button id="saveBtn" class="w-full py-4 bg-purple-600 rounded-2xl font-black">نشر مباشر ✨</button>
        </div>
        <button onclick="toggleAdmin()" class="mt-8 text-gray-600 text-[10px] w-full uppercase">إغلاق</button>
    </aside>

    <header class="pt-12 pb-8 text-center px-6">
        <div class="relative inline-block mb-4">
            <div class="absolute inset-0 bg-blue-500 blur-3xl opacity-20"></div>
            <img id="myAvatar" src="https://i.ibb.co/hFBnP5S/image.png" class="relative w-28 h-28 rounded-full border-2 border-white/10 p-1 object-cover">
        </div>
        <h1 class="text-2xl font-black tracking-tighter italic">🇾🇪 يامي | <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">YAMI</span></h1>
        
        <nav class="mt-8 glass-nav inline-flex p-1 mx-auto">
            <button onclick="changeTab('games')" id="t-games" class="px-6 py-2 text-[11px] font-bold rounded-full tab-active transition">الألعاب</button>
            <button onclick="changeTab('apps')" id="t-apps" class="px-6 py-2 text-[11px] font-bold rounded-full transition text-gray-400">التطبيقات</button>
            <button onclick="changeTab('tools')" id="t-tools" class="px-6 py-2 text-[11px] font-bold rounded-full transition text-gray-400">الأدوات</button>
            <button onclick="changeTab('social')" id="t-social" class="px-6 py-2 text-[11px] font-bold rounded-full transition text-gray-400">تواصل</button>
        </nav>
    </header>

    <main class="max-w-md mx-auto px-6 pb-20">
        <div id="content-area" class="space-y-3">
            </div>

        <div id="social-area" class="hidden space-y-3">
            <a href="https://www.instagram.com/d_a_r_k_j7" target="_blank" class="block p-5 bg-gradient-to-r from-pink-600/10 to-purple-600/10 border border-pink-500/20 rounded-2xl flex items-center gap-4">
                <i class="fab fa-instagram text-2xl text-pink-500"></i>
                <span class="font-bold text-sm">تابعني على إنستقرام</span>
            </a>
            <a href="https://wa.me/966574360046" target="_blank" class="block p-5 bg-gradient-to-r from-green-600/10 to-teal-600/10 border border-green-500/20 rounded-2xl flex items-center gap-4">
                <i class="fab fa-whatsapp text-2xl text-green-500"></i>
                <span class="font-bold text-sm">راسلني واتساب</span>
            </a>
        </div>
    </main>

    <div id="descModal">
        <div class="bg-[#0a0a0f] border border-white/10 w-[90%] max-w-sm rounded-[30px] p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-blue-500"></div>
            <button onclick="closeDesc()" class="absolute top-4 right-4 text-gray-500">✕</button>
            
            <img id="modalImg" class="w-24 h-24 mx-auto rounded-2xl object-cover mb-4 shadow-2xl">
            <h2 id="modalName" class="text-xl font-black text-center mb-2"></h2>
            <p id="modalDesc" class="text-gray-400 text-[11px] text-center leading-relaxed mb-8"></p>
            
            <div id="lockSection">
                <p class="text-[9px] text-center text-red-400 mb-2 font-bold italic">يجب المتابعة لفتح رابط التحميل!</p>
                <button onclick="forceFollow()" class="w-full py-4 bg-white text-black rounded-2xl font-black text-xs flex items-center justify-center gap-2">
                    <i class="fab fa-instagram"></i> تابعني لفتح التحميل 🔒
                </button>
            </div>
            
            <a id="downloadBtn" href="#" target="_blank" class="hidden w-full py-4 bg-gradient-to-r from-green-500 to-teal-500 rounded-2xl font-black text-xs text-center block animate-pulse">
                تم التحقق! تحميل الآن ✅
            </a>
        </div>
    </div>

    <button onclick="adminLogin()" class="fixed bottom-6 left-6 opacity-5 text-[8px]">YAMI LOGIN</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9wIxA2gNyKDdht53W2D4EHEY-e9Fh3j8",
            authDomain: "yamiaapp.firebaseapp.com",
            projectId: "yamiaapp",
            storageBucket: "yamiaapp.firebasestorage.app",
            messagingSenderId: "688692284593",
            appId: "1:688692284593:web:0f83b5d5105325b044e690"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const toBase64 = f => new Promise((res, rej) => {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = () => res(r.result); r.onerror = e => rej(e);
        });

        // النشر
        document.getElementById('saveBtn').onclick = async () => {
            const file = document.getElementById('itemFile').files[0];
            const name = document.getElementById('itemName').value;
            const desc = document.getElementById('itemDesc').value;
            const link = document.getElementById('itemLink').value;
            const type = document.getElementById('itemType').value;

            if(!file || !name) return alert("البيانات ناقصة!");
            
            const img = await toBase64(file);
            await addDoc(collection(db, type), { name, desc, link, img, createdAt: serverTimestamp() });
            alert("تم النشر بنجاح!"); toggleAdmin();
        };

        // تبديل الأقسام
        window.changeTab = (type) => {
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active', 'text-white');
                b.classList.add('text-gray-400');
            });
            document.getElementById('t-' + type).classList.add('tab-active', 'text-white');
            
            if(type === 'social') {
                document.getElementById('content-area').classList.add('hidden');
                document.getElementById('social-area').classList.remove('hidden');
            } else {
                document.getElementById('content-area').classList.remove('hidden');
                document.getElementById('social-area').classList.add('hidden');
                fetchItems(type);
            }
        };

        function fetchItems(type) {
            onSnapshot(query(collection(db, type), orderBy("createdAt", "desc")), snap => {
                const area = document.getElementById('content-area');
                area.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    area.innerHTML += `
                        <button onclick="openDesc('${d.name}', '${d.img}', '${d.desc}', '${d.link}')" 
                                class="w-full p-4 bg-white/5 border border-white/5 rounded-2xl flex items-center justify-between hover:border-purple-500 transition">
                            <div class="flex items-center gap-3">
                                <img src="${d.img}" class="w-10 h-10 rounded-lg object-cover">
                                <span class="text-xs font-bold">${d.name}</span>
                            </div>
                            <i class="fas fa-arrow-left text-[10px] opacity-20"></i>
                        </button>
                    `;
                });
            });
        }

        // نظام الوصف والمتابعة الإجبارية
        window.openDesc = (name, img, desc, link) => {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc || "لا يوجد وصف متوفر لهذا العنصر حالياً.";
            document.getElementById('downloadBtn').href = link;
            
            document.getElementById('lockSection').classList.remove('hidden');
            document.getElementById('downloadBtn').classList.add('hidden');
            document.getElementById('descModal').classList.add('active');
        };

        window.forceFollow = () => {
            window.open('https://www.instagram.com/d_a_r_k_j7', '_blank');
            setTimeout(() => {
                document.getElementById('lockSection').classList.add('hidden');
                document.getElementById('downloadBtn').classList.remove('hidden');
            }, 3000); // يفتح الزر بعد 3 ثواني
        };

        window.closeDesc = () => document.getElementById('descModal').classList.remove('active');
        window.adminLogin = () => { if(prompt("الباسورد:") === "🇾🇪*야미, 네 삼촌|  |يامي عمكم*") toggleAdmin(); };
        window.toggleAdmin = () => document.getElementById('adminSidebar').classList.toggle('open');

        changeTab('games');
    </script>
</body>
</html>
