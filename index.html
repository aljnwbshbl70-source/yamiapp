<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يامي | YAMI HUB PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        #adminSidebar { position: fixed; top: 0; left: -100%; width: 320px; height: 100vh; background: #0a0a0f; border-right: 1px solid #a855f7; z-index: 1000; transition: 0.5s; padding: 25px; overflow-y: auto; }
        #adminSidebar.open { left: 0; }
        .item-card { width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; transition: 0.3s; margin-bottom: 12px; }
        .item-card:hover { border-color: #a855f7; background: rgba(168, 85, 247, 0.05); transform: scale(1.02); }
    </style>
</head>
<body>

    <aside id="adminSidebar">
        <h2 class="text-xl font-black mb-6 text-purple-500">إدارة يامي ⚡</h2>
        
        <div class="mb-6 p-4 bg-white/5 rounded-2xl text-center">
            <p class="text-[10px] text-gray-400 mb-2">تغيير الأفتار الشخصي</p>
            <input type="file" id="avatarFile" accept="image/*" class="hidden">
            <button onclick="document.getElementById('avatarFile').click()" class="text-xs bg-blue-600 px-4 py-2 rounded-lg font-bold">اختيار صورة 👤</button>
        </div>

        <hr class="border-white/5 mb-6">

        <div class="space-y-4">
            <input type="text" id="itemName" placeholder="اسم (لعبة/تطبيق/أداة)" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm">
            
            <div class="border-2 border-dashed border-white/10 p-4 text-center rounded-xl">
                <p class="text-[10px] mb-2 text-gray-400">صورة العنصر (رفع مباشر)</p>
                <input type="file" id="itemFile" accept="image/*" class="text-[10px]">
            </div>

            <input type="text" id="itemLink" placeholder="رابط التحميل المباشر" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm">
            
            <select id="itemType" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm">
                <option value="games">قسم الألعاب 🎮</option>
                <option value="apps">قسم التطبيقات 📱</option>
                <option value="tools">قسم الأدوات 🛠️</option>
            </select>
            
            <button id="saveBtn" class="w-full py-4 bg-purple-600 rounded-2xl font-black shadow-lg">نشر الآن (مجاني) 🚀</button>
        </div>
        <button onclick="toggleAdmin()" class="mt-10 text-gray-600 text-[10px] w-full text-center uppercase tracking-widest">إغلاق اللوحة</button>
    </aside>

    <header class="pt-16 pb-10 text-center px-6">
        <div class="relative inline-block mb-6">
            <div class="absolute inset-0 bg-purple-600 blur-3xl opacity-30"></div>
            <img id="displayAvatar" src="https://i.ibb.co/hFBnP5S/image.png" class="relative w-32 h-32 rounded-full border-4 border-purple-500/30 p-1 object-cover">
        </div>
        <h1 class="text-3xl font-black mb-1 tracking-tighter italic">🇾🇪 يامي | YAMI</h1>
        <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em]">The Small Developer</p>

        <nav class="mt-10 flex justify-center gap-2 overflow-x-auto pb-4 px-4">
            <button onclick="switchTab('games')" class="glass px-6 py-3 text-xs font-bold whitespace-nowrap active" id="btn-games">الألعاب</button>
            <button onclick="switchTab('apps')" class="glass px-6 py-3 text-xs font-bold whitespace-nowrap" id="btn-apps">التطبيقات</button>
            <button onclick="switchTab('tools')" class="glass px-6 py-3 text-xs font-bold whitespace-nowrap" id="btn-tools">الأدوات</button>
        </nav>
    </header>

    <main class="max-w-xl mx-auto px-6 pb-20">
        <div id="main-list" class="space-y-1">
            </div>
    </main>

    <button onclick="adminCheck()" class="fixed bottom-6 left-6 opacity-5 text-[8px] hover:opacity-100 transition">ADMIN</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        // استخدام القاعدة الجديدة الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyD9wIxA2gNyKDdht53W2D4EHEY-e9Fh3j8",
            authDomain: "yamiaapp.firebaseapp.com",
            projectId: "yamiaapp",
            storageBucket: "yamiaapp.firebasestorage.app",
            messagingSenderId: "688692284593",
            appId: "1:688692284593:web:0f83b5d5105325b044e690",
            measurementId: "G-RJEFYNX7JZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // وظيفة تحويل الصورة لنص (Base64) للتوفير
        const fileToText = file => new Promise((res, rej) => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = () => res(r.result);
            r.onerror = e => rej(e);
        });

        // رفع الأفتار الشخصي
        document.getElementById('avatarFile').onchange = async (e) => {
            const file = e.target.files[0];
            if(file) {
                const text = await fileToText(file);
                await setDoc(doc(db, "settings", "profile"), { avatar: text });
                alert("تم تحديث الأفتار! 👤");
            }
        };

        // عرض الأفتار المحفوظ
        onSnapshot(doc(db, "settings", "profile"), d => {
            if(d.exists()) document.getElementById('displayAvatar').src = d.data().avatar;
        });

        // نشر عنصر جديد
        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('itemName').value;
            const link = document.getElementById('itemLink').value;
            const type = document.getElementById('itemType').value;
            const file = document.getElementById('itemFile').files[0];

            if(!name || !file || !link) return alert("عبئ الخانات وارفع الصورة!");

            document.getElementById('saveBtn').innerText = "جاري النشر...";
            const imgText = await fileToText(file);

            await addDoc(collection(db, type), {
                name, link, img: imgText, createdAt: serverTimestamp()
            });

            alert("تم النشر بنجاح مجاناً! ✅");
            toggleAdmin();
            document.getElementById('saveBtn').innerText = "نشر الآن (مجاني) 🚀";
        };

        // تبديل الأقسام وعرض البيانات
        window.switchTab = (type) => {
            onSnapshot(query(collection(db, type), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('main-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="item-card">
                            <div class="flex items-center gap-4">
                                <img src="${d.img}" class="w-12 h-12 rounded-xl object-cover shadow-lg border border-white/5">
                                <span class="text-sm font-bold tracking-tight">${d.name}</span>
                            </div>
                            <a href="${d.link}" target="_blank" class="px-5 py-2 bg-white text-black text-[10px] font-black rounded-full hover:bg-purple-500 hover:text-white transition uppercase">Get</a>
                        </div>`;
                });
            });
        };

        window.adminCheck = () => { if(prompt("Pass:") === "🇾🇪*야미, 네 삼촌|  |يامي عمكم*") toggleAdmin(); };
        window.toggleAdmin = () => document.getElementById('adminSidebar').classList.toggle('open');
        
        // تشغيل قسم الألعاب عند الفتح
        switchTab('games');
    </script>
</body>
</html>
