<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇾🇪 야미, 네 삼촌 | يامي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-purple: #a855f7; --main-bg: #050505; }
        body { background-color: var(--main-bg) !important; color: white !important; font-family: 'Tajawal', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%) !important; box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); border: none !important; }
        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .active-content { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

    <header class="py-10 text-center">
        <img src="https://via.placeholder.com/150" id="profileImg" class="w-28 h-28 rounded-full mx-auto border-2 border-purple-500 p-1 mb-4 shadow-lg shadow-purple-500/20">
        <h1 class="text-3xl font-black text-purple-400">🇾🇪 야미, 네 삼촌 | يامي</h1>
        <p class="text-gray-400 text-sm mt-2 italic">المركز الرقمي الشخصي ⚡</p>
    </header>

    <nav class="max-w-md mx-auto px-4 grid grid-cols-3 gap-2 mb-10">
        <button onclick="showTab('games')" id="btn-games" class="tab-btn glass py-3 rounded-xl text-xs font-bold active-tab">الألعاب</button>
        <button onclick="showTab('apps')" id="btn-apps" class="tab-btn glass py-3 rounded-xl text-xs font-bold">التطبيقات</button>
        <button onclick="showTab('contact')" id="btn-contact" class="tab-btn glass py-3 rounded-xl text-xs font-bold">تواصل</button>
    </nav>

    <main class="max-w-4xl mx-auto px-6">
        
        <div id="games" class="tab-content active-content">
            <h2 class="text-xl font-bold mb-6 border-r-4 border-purple-500 pr-2">ألعابي 🔥</h2>
            <div id="games-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <p class="text-gray-600 text-xs">جاري تحميل الألعاب من قاعدة البيانات...</p>
            </div>
        </div>

        <div id="apps" class="tab-content">
            <h2 class="text-xl font-bold mb-6 border-r-4 border-blue-500 pr-2">تطبيقاتي المختارّة 📱</h2>
            <div id="apps-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <p class="text-gray-600 text-xs text-center">جاري تحميل التطبيقات...</p>
            </div>
        </div>

        <div id="contact" class="tab-content text-center">
            <h2 class="text-xl font-bold mb-8">خلينا ندردش 🤝</h2>
            <div class="space-y-4 max-w-sm mx-auto">
                <a href="https://www.instagram.com/d_a_r_k_j7" target="_blank" class="glass block p-5 rounded-2xl flex items-center gap-4 hover:bg-pink-600/10">
                    <i class="fab fa-instagram text-2xl text-pink-500"></i> Instagram
                </a>
                <a href="https://wa.me/966574360046" target="_blank" class="glass block p-5 rounded-2xl flex items-center gap-4 hover:bg-green-600/10">
                    <i class="fab fa-whatsapp text-2xl text-green-500"></i> WhatsApp
                </a>
            </div>
        </div>

    </main>

    <script>
        // 🛠️ وظيفة تبديل الأقسام
        function showTab(tabId) {
            // إخفاء كل المحتوى
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active-content');
            });
            // إزالة اللون من كل الأزرار
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active-tab');
            });
            // إظهار المحتوى المطلوب
            document.getElementById(tabId).classList.add('active-content');
            // تلوين الزر المختار
            document.getElementById('btn-' + tabId).classList.add('active-tab');
        }
    </script>

    </body>
</html>
