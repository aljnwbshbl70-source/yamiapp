<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇾🇪 야미, 네 삼촌 | يامي - المركز الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --neon-purple: #a855f7;
            --neon-blue: #3b82f6;
            --deep-black: #020205;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--deep-black) !important;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* تأثير الخلفية المتوهجة */
        .orb {
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            top: -200px; left: -200px;
            z-index: -1;
            filter: blur(100px);
        }

        /* تصميم الكروت الزجاجية */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--neon-purple);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(168, 85, 247, 0.2);
        }

        /* Sidebar الإدارة */
        #adminSidebar {
            position: fixed;
            top: 0; left: -100%;
            width: 340px; height: 100vh;
            background: #08080c;
            border-right: 1px solid var(--neon-purple);
            z-index: 1000;
            padding: 30px;
            transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #adminSidebar.open { left: 0; }

        .nav-btn {
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border: none;
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.3);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.5s ease; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 160px; height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
        }
    </style>
</head>
<body>

    <div class="orb"></div>
    <div class="orb" style="top: auto; bottom: -200px; left: auto; right: -200px; background: rgba(59, 130, 246, 0.1);"></div>

    <aside id="adminSidebar">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-black text-purple-500">لوحة التحكم</h2>
            <button onclick="toggleAdmin()" class="text-gray-500 hover:text-white text-2xl">✕</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="itemName" placeholder="الاسم (لعبة/تطبيق)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm outline-none focus:border-purple-500 transition">
            <input type="text" id="itemImg" placeholder="رابط الصورة المباشر" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm outline-none focus:border-purple-500 transition">
            <input type="text" id="itemLink" placeholder="رابط التحميل" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm outline-none focus:border-purple-500 transition">
            
            <select id="itemType" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm outline-none">
                <option value="games">إضافة إلى الألعاب 🎮</option>
                <option value="apps">إضافة إلى التطبيقات 📱</option>
            </select>

            <button id="publishBtn" class="w-full py-4 bg-purple-600 rounded-2xl font-black text-sm shadow-xl hover:bg-purple-500 transition mt-6">نشر الآن 🚀</button>
        </div>
    </aside>

    <header class="pt-20 pb-10 text-center px-6">
        <div class="mb-6 inline-block relative">
            <div class="absolute inset-0 bg-purple-600 blur-3xl opacity-20"></div>
            <img src="https://aljnwbshbl70-source.github.io/yamiapp/232724.png" 
                 onerror="this.src='https://via.placeholder.com/200?text=YAMI'" 
                 class="profile-img relative">
        </div>
        <h1 class="text-4xl md:text-5xl font-black tracking-tighter mb-2">🇾🇪 야미, 네 삼촌 | يامي</h1>
        <p class="text-gray-500 text-sm font-light italic">"المركز الرقمي الرسمي ليامي عمكم ⚡"</p>

        <div class="mt-10 flex justify-center gap-3">
            <button onclick="openTab('games')" id="btn-games" class="nav-btn active">الألعاب 🎮</button>
            <button onclick="openTab('apps')" id="btn-apps" class="nav-btn">التطبيقات 📱</button>
            <button onclick="openTab('social')" id="btn-social" class="nav-btn">تواصل 🌐</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-40">
        
        <div id="tab-games" class="tab-content active">
            <div id="games-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>

        <div id="tab-apps" class="tab-content">
            <div id="apps-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>

        <div id="tab-social" class="tab-content">
            <div class="max-w-md mx-auto space-y-4">
                <a href="https://www.instagram.com/d_a_r_k_j7" target="_blank" class="glass-card p-6 flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <i class="fab fa-instagram text-3xl text-pink-500"></i>
                        <span class="font-bold">Instagram</span>
                    </div>
                    <i class="fas fa-arrow-left opacity-0 group-hover:opacity-100 transition"></i>
                </a>
                <a href="https://wa.me/966574360046" target="_blank" class="glass-card p-6 flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <i class="fab fa-whatsapp text-3xl text-green-500"></i>
                        <span class="font-bold">WhatsApp</span>
                    </div>
                    <i class="fas fa-arrow-left opacity-0 group-hover:opacity-100 transition"></i>
                </a>
            </div>
        </div>

    </main>

    <button onclick="checkAdmin()" class="fixed bottom-6 left-6 w-10 h-10 bg-white/5 rounded-full border border-white/10 flex items-center justify-center text-xs text-gray-600 hover:text-white transition">⚙️</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6XA3vWHFskKV_6v5Xj7TTBO8W0bvhQ2E",
            authDomain: "yamiapp-e7765.firebaseapp.com",
            projectId: "yamiapp-e7765",
            storageBucket: "yamiapp-e7765.firebasestorage.app",
            messagingSenderId: "546559285368",
            appId: "1:546559285368:web:8a2313d35126a93cb8758d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- نظام الإدارة ---
        window.checkAdmin = () => {
            if (prompt("كلمة المرور يا عمنا:") === "🇾🇪*야미, 네 삼촌|  |يامي عمكم*") {
                toggleAdmin();
            }
        };

        window.toggleAdmin = () => document.getElementById('adminSidebar').classList.toggle('open');

        // --- النشر ---
        document.getElementById('publishBtn').onclick = async () => {
            const name = document.getElementById('itemName').value;
            const img = document.getElementById('itemImg').value;
            const link = document.getElementById('itemLink').value;
            const type = document.getElementById('itemType').value;

            if(name && img && link) {
                await addDoc(collection(db, type), { name, img, link, createdAt: serverTimestamp() });
                alert("تم النشر بنجاح! 🎉");
                location.reload();
            }
        };

        // --- جلب البيانات ---
        function sync(col, gridId) {
            onSnapshot(query(collection(db, col), orderBy("createdAt", "desc")), (snap) => {
                const grid = document.getElementById(gridId);
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    grid.innerHTML += `
                        <div class="glass-card p-4 text-center">
                            <img src="${d.img}" class="w-full h-28 object-cover rounded-xl mb-3 shadow-lg" onerror="this.src='https://via.placeholder.com/150'">
                            <h3 class="text-[10px] font-bold truncate mb-3">${d.name}</h3>
                            <a href="${d.link}" target="_blank" class="block py-2 bg-white/5 rounded-lg text-[9px] font-black hover:bg-white hover:text-black transition">DOWNLOAD</a>
                        </div>`;
                });
            });
        }
        sync('games', 'games-grid'); sync('apps', 'apps-grid');

        // --- تبديل التابات ---
        window.openTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        };
    </script>
</body>
</html>
