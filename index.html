<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يامي | YAMI HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020205; color: white; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-active { background: linear-gradient(135deg, #a855f7, #3b82f6); color: white !important; }
        #descModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        #descModal.active { display: flex; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        #adminSidebar { position: fixed; top: 0; left: -100%; width: 320px; height: 100vh; background: #08080c; border-right: 2px solid #a855f7; z-index: 5000; transition: 0.5s; padding: 25px; overflow-y: auto; }
        #adminSidebar.open { left: 0; }
        .search-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 12px 20px; width: 100%; outline: none; transition: 0.3s; font-size: 12px; }
        .search-box:focus { border-color: #a855f7; background: rgba(168, 85, 247, 0.05); }
    </style>
</head>
<body>

    <aside id="adminSidebar">
        <h2 class="text-xl font-black mb-6 text-purple-500 italic text-center">YAMI CONTROL</h2>
        
        <div class="mb-6 p-4 bg-white/5 rounded-2xl text-center border border-white/5">
            <p class="text-[10px] text-gray-400 mb-2 font-bold">تغيير الأفتار الشخصي</p>
            <input type="file" id="avatarFile" accept="image/*" class="hidden">
            <button onclick="document.getElementById('avatarFile').click()" class="text-[10px] bg-blue-600 px-4 py-2 rounded-lg font-black">اختر صورة 👤</button>
        </div>

        <div class="space-y-4 mb-8">
            <input type="text" id="itemName" placeholder="اسم العنصر" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm">
            <input type="file" id="itemFile" accept="image/*" class="text-[10px] block w-full">
            <textarea id="itemDesc" placeholder="الوصف" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm h-16"></textarea>
            <input type="text" id="itemLink" placeholder="رابط التحميل" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm">
            <select id="itemType" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none text-sm">
                <option value="trending">🔥 جديد ورائج</option>
                <option value="games">🎮 ألعاب</option>
                <option value="apps">📱 تطبيقات</option>
                <option value="tools">🛠️ أدوات</option>
            </select>
            <button id="saveBtn" class="w-full py-4 bg-purple-600 rounded-2xl font-black">نشر الآن ✨</button>
        </div>

        <hr class="border-white/5 mb-6">
        <h3 class="text-xs font-bold text-purple-500 mb-2 uppercase">إدارة المحتوى والبحث 🗑️</h3>
        <input type="text" id="adminSearch" oninput="filterAdminItems()" placeholder="ابحث في ملفاتك..." class="search-box mb-4">
        <div id="admin-items-list" class="space-y-2 pb-10"></div>

        <button onclick="toggleAdmin()" class="mt-4 text-gray-600 text-[10px] w-full">إغلاق اللوحة</button>
    </aside>

    <header class="pt-12 pb-4 text-center px-4">
        <div class="relative inline-block mb-4">
            <div class="absolute inset-0 bg-blue-500 blur-3xl opacity-20"></div>
            <img id="myAvatar" src="https://i.ibb.co/hFBnP5S/image.png" class="relative w-28 h-28 rounded-full border-2 border-white/10 p-1 object-cover">
        </div>
        <h1 class="text-2xl font-black tracking-tighter italic">🇾🇪 يامي | <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">YAMI</span></h1>
        
        <div class="max-w-sm mx-auto mt-6 px-4">
            <input type="text" id="mainSearch" oninput="searchItems()" placeholder="ابحث عن ألعاب، تطبيقات، أدوات..." class="search-box text-center">
        </div>

        <nav class="mt-6 glass-nav inline-flex p-1 mx-auto overflow-x-auto max-w-full">
            <button onclick="changeTab('trending')" id="t-trending" class="px-5 py-2 text-[10px] font-bold rounded-full tab-active transition whitespace-nowrap">جديد 🔥</button>
            <button onclick="changeTab('games')" id="t-games" class="px-5 py-2 text-[10px] font-bold rounded-full transition text-gray-400 whitespace-nowrap">الألعاب</button>
            <button onclick="changeTab('apps')" id="t-apps" class="px-5 py-2 text-[10px] font-bold rounded-full transition text-gray-400 whitespace-nowrap">التطبيقات</button>
            <button onclick="changeTab('tools')" id="t-tools" class="px-5 py-2 text-[10px] font-bold rounded-full transition text-gray-400 whitespace-nowrap">الأدوات</button>
            <button onclick="changeTab('social')" id="t-social" class="px-5 py-2 text-[10px] font-bold rounded-full transition text-gray-400 whitespace-nowrap">تواصل</button>
        </nav>
    </header>

    <main class="max-w-md mx-auto px-6 pb-20 mt-4">
        <div id="content-area" class="space-y-3"></div>
        <div id="social-area" class="hidden space-y-3">
            <a href="https://www.instagram.com/d_a_r_k_j7" target="_blank" class="block p-5 bg-white/5 border border-pink-500/20 rounded-2xl flex items-center gap-4">
                <i class="fab fa-instagram text-2xl text-pink-500"></i>
                <span class="font-bold text-sm">إنستقرام يامي</span>
            </a>
            <a href="https://wa.me/966574360046" target="_blank" class="block p-5 bg-white/5 border border-green-500/20 rounded-2xl flex items-center gap-4">
                <i class="fab fa-whatsapp text-2xl text-green-500"></i>
                <span class="font-bold text-sm">واتساب يامي</span>
            </a>
        </div>
    </main>

    <div id="descModal">
        <div class="bg-[#0a0a0f] border border-white/10 w-[90%] max-w-sm rounded-[30px] p-8 relative">
            <button onclick="closeDesc()" class="absolute top-4 right-4 text-gray-500 text-xl">✕</button>
            <img id="modalImg" src="" class="w-20 h-20 mx-auto rounded-2xl object-cover mb-4">
            <h2 id="modalName" class="text-xl font-black text-center mb-2"></h2>
            <p id="modalDesc" class="text-gray-400 text-[11px] text-center mb-8 leading-relaxed"></p>
            <div id="lockSection">
                <button onclick="forceFollow()" class="w-full py-4 bg-white text-black rounded-2xl font-black text-xs shadow-xl">تابعني لفتح التحميل 🔒</button>
            </div>
            <a id="downloadBtn" href="#" target="_blank" class="hidden w-full py-4 bg-purple-600 rounded-2xl font-black text-xs text-center block">تم التحقق! تحميل الآن ✅</a>
        </div>
    </div>

    <button onclick="adminLogin()" class="fixed bottom-6 left-6 opacity-0">ADMIN</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9wIxA2gNyKDdht53W2D4EHEY-e9Fh3j8",
            authDomain: "yamiaapp.firebaseapp.com",
            projectId: "yamiaapp",
            storageBucket: "yamiaapp.firebasestorage.app",
            messagingSenderId: "688692284593",
            appId: "1:688692284593:web:0f83b5d5105325b044e690"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentItems = []; // مصفوفة لتخزين العناصر الحالية للبحث
        let adminItems = [];   // مصفوفة لإدارة الحذف

        const toBase64 = f => new Promise((res, rej) => {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = () => res(r.result); r.onerror = e => rej(e);
        });

        // رفع الأفتار
        document.getElementById('avatarFile').onchange = async (e) => {
            const file = e.target.files[0];
            if(file) {
                const text = await toBase64(file);
                await setDoc(doc(db, "settings", "profile"), { avatar: text });
                alert("تم تحديث الأفتار!");
            }
        };

        onSnapshot(doc(db, "settings", "profile"), d => {
            if(d.exists()) document.getElementById('myAvatar').src = d.data().avatar;
        });

        // نشر جديد
        document.getElementById('saveBtn').onclick = async () => {
            const file = document.getElementById('itemFile').files[0];
            const name = document.getElementById('itemName').value;
            const desc = document.getElementById('itemDesc').value;
            const link = document.getElementById('itemLink').value;
            const type = document.getElementById('itemType').value;

            if(!file || !name) return alert("البيانات ناقصة!");
            document.getElementById('saveBtn').innerText = "...جاري النشر";
            const img = await toBase64(file);
            await addDoc(collection(db, type), { name, desc, link, img, createdAt: serverTimestamp() });
            alert("تم النشر بنجاح!"); 
            document.getElementById('saveBtn').innerText = "نشر الآن ✨";
        };

        // تبديل التابات
        window.changeTab = (type) => {
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active', 'text-white');
                b.classList.add('text-gray-400');
            });
            document.getElementById('t-' + type).classList.add('tab-active', 'text-white');
            if(type === 'social') {
                document.getElementById('content-area').classList.add('hidden');
                document.getElementById('social-area').classList.remove('hidden');
                document.getElementById('mainSearch').classList.add('hidden');
            } else {
                document.getElementById('content-area').classList.remove('hidden');
                document.getElementById('social-area').classList.add('hidden');
                document.getElementById('mainSearch').classList.remove('hidden');
                fetchItems(type);
                updateAdminList(type);
            }
        };

        function fetchItems(type) {
            onSnapshot(query(collection(db, type), orderBy("createdAt", "desc")), snap => {
                currentItems = [];
                snap.forEach(doc => currentItems.push({ id: doc.id, ...doc.data() }));
                displayItems(currentItems);
            });
        }

        function displayItems(items) {
            const area = document.getElementById('content-area');
            area.innerHTML = "";
            items.forEach(d => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 bg-white/5 rounded-2xl flex items-center justify-between border border-white/5 hover:border-purple-500 transition mb-3";
                btn.onclick = () => openDesc(d.name, d.img, d.desc, d.link);
                btn.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${d.img}" class="w-10 h-10 rounded-lg object-cover">
                        <span class="text-xs font-bold">${d.name}</span>
                    </div>
                    <i class="fas fa-arrow-left text-[10px] opacity-20"></i>
                `;
                area.appendChild(btn);
            });
        }

        // محرك البحث في الموقع
        window.searchItems = () => {
            const term = document.getElementById('mainSearch').value.toLowerCase();
            const filtered = currentItems.filter(i => i.name.toLowerCase().includes(term));
            displayItems(filtered);
        };

        // محرك البحث والحذف في الإدارة
        function updateAdminList(type) {
            onSnapshot(query(collection(db, type), orderBy("createdAt", "desc")), snap => {
                adminItems = [];
                snap.forEach(docSnap => adminItems.push({ id: docSnap.id, type: type, ...docSnap.data() }));
                filterAdminItems();
            });
        }

        window.filterAdminItems = () => {
            const term = document.getElementById('adminSearch').value.toLowerCase();
            const adminList = document.getElementById('admin-items-list');
            adminList.innerHTML = "";
            adminItems.filter(i => i.name.toLowerCase().includes(term)).forEach(item => {
                adminList.innerHTML += `
                    <div class="flex items-center justify-between bg-white/5 p-2 rounded-lg border border-white/5">
                        <span class="text-[10px] truncate w-24 font-bold">${item.name}</span>
                        <button onclick="deleteItem('${item.type}', '${item.id}')" class="text-red-500 hover:text-red-400 p-2">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>`;
            });
        };

        window.deleteItem = async (type, id) => {
            if(confirm("حذف هذا الملف؟")) {
                await deleteDoc(doc(db, type, id));
                alert("تم الحذف!");
            }
        };

        // إصلاح نافذة الوصف والتعليق
        window.openDesc = (name, img, desc, link) => {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc || "لا يوجد وصف متوفر.";
            document.getElementById('downloadBtn').href = link;
            document.getElementById('lockSection').classList.remove('hidden');
            document.getElementById('downloadBtn').classList.add('hidden');
            document.getElementById('descModal').classList.add('active');
        };

        window.forceFollow = () => {
            window.open('https://www.instagram.com/d_a_r_k_j7', '_blank');
            setTimeout(() => {
                document.getElementById('lockSection').classList.add('hidden');
                document.getElementById('downloadBtn').classList.remove('hidden');
            }, 2500);
        };

        window.closeDesc = () => document.getElementById('descModal').classList.remove('active');
        window.adminLogin = () => { if(prompt("Pass:") === "🇾🇪*야미, 네 삼촌|  |يامي عمكم*") toggleAdmin(); };
        window.toggleAdmin = () => document.getElementById('adminSidebar').classList.toggle('open');

        changeTab('trending');
    </script>
</body>
</html>
